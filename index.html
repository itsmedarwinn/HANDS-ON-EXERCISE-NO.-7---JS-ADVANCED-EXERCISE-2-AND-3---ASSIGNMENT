<!DOCTYPE html>
<html>
<head>
<title>Javascript Web Output #2</title>

<style>
body{
font-family: Arial;
margin:20px;
}

input{
margin:4px;
}

table{
border-collapse: collapse;
width:70%;
margin-top:15px;
}

table, th, td{
border:1px solid black;
padding:8px;
text-align:center;
}

button{
margin:4px;
}
</style>
</head>

<body>

<h2>Javascript Web Output #2</h2>

<label>First Name:</label>
<input type="text" id="fname"><br>

<label>Middle Name:</label>
<input type="text" id="mname"><br>

<label>Last Name:</label>
<input type="text" id="lname"><br>

<label>Age:</label>
<input type="number" id="age"><br>

<button onclick="insertRecord()" id="mainBtn">Insert</button>
<button onclick="clearForm()">Clear</button>

<h3>Records</h3>

<table>
<thead>
<tr>
<th>First Name</th>
<th>Middle Name</th>
<th>Last Name</th>
<th>Age</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<br>

<button onclick="clearRecords()">Clear Records</button>

<label>Sort by:</label>
<select id="sortField">
<option value="fname">First Name</option>
<option value="lname">Last Name</option>
<option value="age">Age</option>
</select>

<select id="sortOrder">
<option value="asc">A-Z</option>
<option value="desc">Z-A</option>
</select>

<button onclick="sortRecords()">Sort</button>

<button onclick="saveLocal()">Save to Local Storage</button>

<script>

let records = [];
let editIndex = -1;

function insertRecord(){

let fname = document.getElementById("fname").value;
let mname = document.getElementById("mname").value;
let lname = document.getElementById("lname").value;
let age = document.getElementById("age").value;

let data = {fname,mname,lname,age};

if(editIndex == -1){
records.push(data);
}else{
records[editIndex] = data;
editIndex = -1;
document.getElementById("mainBtn").innerText="Insert";
}

displayRecords();
clearForm();

}

function displayRecords(){

let body = document.getElementById("tableBody");
body.innerHTML="";

records.forEach((rec,index)=>{

body.innerHTML += `
<tr>
<td>${rec.fname}</td>
<td>${rec.mname}</td>
<td>${rec.lname}</td>
<td>${rec.age}</td>
<td>
<button onclick="editRecord(${index})">Edit</button>
<button onclick="deleteRecord(${index})">Delete</button>
</td>
</tr>
`;

});

}

function editRecord(index){

let rec = records[index];

document.getElementById("fname").value = rec.fname;
document.getElementById("mname").value = rec.mname;
document.getElementById("lname").value = rec.lname;
document.getElementById("age").value = rec.age;

editIndex = index;
document.getElementById("mainBtn").innerText="Update";

}

function deleteRecord(index){

records.splice(index,1);
displayRecords();

}

function clearForm(){

document.getElementById("fname").value="";
document.getElementById("mname").value="";
document.getElementById("lname").value="";
document.getElementById("age").value="";

editIndex=-1;
document.getElementById("mainBtn").innerText="Insert";

}

function clearRecords(){

records=[];
displayRecords();
localStorage.removeItem("records");

}

function sortRecords(){

let field = document.getElementById("sortField").value;
let order = document.getElementById("sortOrder").value;

records.sort((a,b)=>{

if(order=="asc"){
return a[field] > b[field] ? 1 : -1;
}else{
return a[field] < b[field] ? 1 : -1;
}

});

displayRecords();

}

function saveLocal(){

localStorage.setItem("records", JSON.stringify(records));
alert("Saved to Local Storage");

}

function loadLocal(){

let saved = localStorage.getItem("records");

if(saved){
records = JSON.parse(saved);
displayRecords();
}

}

loadLocal();

</script>

</body>
</html>
